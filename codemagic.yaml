workflows:
  ios-html-app:
    name: Build FlexOS iOS IPA
    max_build_duration: 30
    instance_type: mac_mini_m2
    scripts:
      - name: Install Pods and Build Real IPA
        script: |
          cd ios/App
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CONFIGURATION_BUILD_DIR=$CM_BUILD_DIR clean build
          cd $CM_BUILD_DIR
          mkdir -p Payload
          cp -R App.app Payload/
          zip -r FlexOS.ipa Payload
    artifacts:
      - $CM_BUILD_DIR/*.ipa